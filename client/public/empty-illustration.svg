  <path d="M40 80 L43 75 L46 80 L43 85 Z" fill="#9CA3AF"/>
  <path d="M38 80 L43 77 L48 80 L43 83 Z" fill="#9CA3AF"/>
  <!-- Sparkle 2 - small top -->
  <path d="M145 45 L146.5 41 L148 45 L146.5 49 Z" fill="#D1D5DB"/>
  <path d="M143.5 45 L146.5 42.5 L149.5 45 L146.5 47.5 Z" fill="#D1D5DB"/>

