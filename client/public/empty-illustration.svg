<svg width="220" height="200" viewBox="0 0 220 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle ring -->
  <circle cx="115" cy="100" r="65" stroke="#E5E7EB" stroke-width="1.5" fill="#F9FAFB"/>

  <!-- Back document (slightly rotated) -->
  <g transform="translate(75, 45) rotate(-4, 30, 35)">
    <rect width="60" height="75" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.2"/>
    <line x1="10" y1="16" x2="50" y2="16" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="24" x2="42" y2="24" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="32" x2="46" y2="32" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="40" x2="35" y2="40" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Front document (slightly rotated other way) -->
  <g transform="translate(85, 52) rotate(3, 30, 35)">
    <rect width="60" height="75" rx="4" fill="white" stroke="#D1D5DB" stroke-width="1.2"/>
    <!-- Dark header bar on document -->
    <rect x="10" y="10" width="40" height="5" rx="2.5" fill="#374151"/>
    <line x1="10" y1="22" x2="50" y2="22" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="30" x2="44" y2="30" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="38" x2="48" y2="38" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="46" x2="38" y2="46" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="54" x2="45" y2="54" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Magnifying glass -->
  <circle cx="130" cy="100" r="30" stroke="#9CA3AF" stroke-width="2.5" fill="white" fill-opacity="0.85"/>
  <!-- Handle -->
  <line x1="152" y1="122" x2="170" y2="140" stroke="#9CA3AF" stroke-width="5" stroke-linecap="round"/>

  <!-- Red X inside magnifying glass -->
  <line x1="118" y1="88" x2="142" y2="112" stroke="#EF4444" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="142" y1="88" x2="118" y2="112" stroke="#EF4444" stroke-width="3.5" stroke-linecap="round"/>

  <!-- 4-point sparkle (left) -->
  <path d="M38 88 L42 80 L46 88 L42 96 Z" fill="#9CA3AF"/>
  <path d="M34 88 L42 84 L50 88 L42 92 Z" fill="#9CA3AF"/>

  <!-- Small sparkle (top-right) -->
  <path d="M160 48 L162 43 L164 48 L162 53 Z" fill="#D1D5DB"/>
  <path d="M158 48 L162 45 L166 48 L162 51 Z" fill="#D1D5DB"/>

  <!-- Blue decorative dots -->
  <circle cx="170" cy="65" r="3" fill="#93C5FD"/>
  <circle cx="40" cy="120" r="2.5" fill="#93C5FD"/>
  <circle cx="178" cy="118" r="2" fill="#BFDBFE"/>
  <circle cx="55" cy="60" r="1.5" fill="#BFDBFE"/>
</svg>
