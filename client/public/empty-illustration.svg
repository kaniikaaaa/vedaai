<svg width="200" height="180" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle ring -->
  <circle cx="108" cy="90" r="60" stroke="#E5E7EB" stroke-width="2" fill="#F9FAFB"/>

  <!-- Document shapes behind -->
  <rect x="70" y="40" width="55" height="70" rx="4" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
  <rect x="78" y="48" width="55" height="70" rx="4" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <!-- Document lines -->
  <line x1="88" y1="62" x2="122" y2="62" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="88" y1="70" x2="115" y2="70" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="88" y1="78" x2="118" y2="78" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>
  <line x1="88" y1="86" x2="108" y2="86" stroke="#E5E7EB" stroke-width="2" stroke-linecap="round"/>

  <!-- Magnifying glass -->
  <circle cx="120" cy="95" r="28" stroke="#9CA3AF" stroke-width="3" fill="white" fill-opacity="0.8"/>
  <line x1="140" y1="115" x2="158" y2="133" stroke="#9CA3AF" stroke-width="4" stroke-linecap="round"/>
  <!-- Magnifying glass handle -->
  <rect x="152" y="128" width="12" height="6" rx="3" fill="#9CA3AF" transform="rotate(45 152 128)"/>

  <!-- Red X inside magnifying glass -->
  <line x1="110" y1="85" x2="130" y2="105" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>
  <line x1="130" y1="85" x2="110" y2="105" stroke="#EF4444" stroke-width="4" stroke-linecap="round"/>

  <!-- Pen/nib element top-left -->
  <path d="M55 35 L60 50 L52 48 Z" fill="#6B7280"/>
  <line x1="58" y1="28" x2="56" y2="42" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M54 24 Q58 20 62 24 L58 32 L54 32 Z" fill="#374151"/>

  <!-- Sparkle decorations -->
